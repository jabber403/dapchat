<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Platform - Custom Storage Engine</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); overflow: hidden; }
        .platform-container { width: 1100px; height: 710px; display: flex; background: rgba(255, 255, 255, 0.08); border-radius: 24px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); overflow: hidden; }
        .sidebar { width: 280px; background: rgba(0,0,0,0.2); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 20px; gap: 20px; overflow-y: auto; }
        .sidebar-section { display: flex; flex-direction: column; gap: 8px; }
        .sidebar h3 { color: rgba(255,255,255,0.6); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .item-btn { padding: 10px 14px; border-radius: 12px; background: rgba(255,255,255,0.03); color: white; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.9rem; }
        .item-btn:hover, .item-btn.active { background: rgba(255,255,255,0.15); font-weight: 600; }
        .creation-form { display: flex; gap: 6px; }
        .creation-form input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 6px 10px; border-radius: 8px; font-size: 0.8rem; outline: none; }
        .creation-form button { padding: 6px 10px; background: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .chat-engine { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 25px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); color: white; font-weight: 600; }
        .messages-area { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrap { display: flex; flex-direction: column; max-width: 65%; color: white; }
        .msg-wrap.me { align-self: flex-end; }
        .msg-wrap.other { align-self: flex-start; }
        .msg-author { font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-bottom: 3px; }
        .msg-bubble { padding: 11px 15px; border-radius: 16px; background: rgba(255, 255, 255, 0.15); font-size: 0.95rem; }
        .msg-wrap.me .msg-bubble { background: #007aff; }
        .input-bar { padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.15); }
        .input-bar input { flex: 1; padding: 14px 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.2); color: white; outline: none; }
        .input-bar button { padding: 0 24px; border-radius: 25px; border: none; background: white; font-weight: bold; cursor: pointer; }
        .user-tag { margin-top: auto; color: #a1c4fd; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="platform-container">
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>Channels</h3>
                {% for room_name, r_data in rooms.items() if not r_data.is_private %}
                    <button class="item-btn {% if room_name == 'General' %}active{% endif %}" onclick="switchGroup('{{ room_name }}')"># {{ room_name }}</button>
                {% endfor %}
            </div>
            <div class="sidebar-section">
                <h3>Direct Messages</h3>
                {% for user in users_list %}
                    <button class="item-btn" onclick="switchDM('{{ user }}')">💬 {{ user }}</button>
                {% endfor %}
            </div>
            <div class="sidebar-section">
                <h3>Custom API Profiles</h3>
                {% for key in developer_keys %}
                    <div class="item-btn" style="cursor:pointer; font-size:11px; opacity:0.8; font-family:monospace;" onclick="alert('Key Details: {{key}}')">🔑 Click to View Key</div>
                {% endfor %}
                <div class="creation-form">
                    <input type="text" id="app-name-input" placeholder="App Identity Name" autocomplete="off">
                    <button onclick="mintDeveloperKey()">Mint</button>
                </div>
            </div>
            <div class="user-tag">@{{ username }}<br><br><a href="/logout" style="color:#ff6b6b; text-decoration:none;">[Disconnect]</a></div>
        </div>
        <div class="chat-engine">
            <div class="chat-header" id="current-chat-title">Group: # General</div>
            <div class="messages-area" id="msg-container"></div>
            <div class="input-bar">
                <input type="text" id="chat-input-field" placeholder="Type message..." autocomplete="off">
                <button id="dispatch-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const clientUser = "{{ username }}";
        let activeChatMode = "group";
        let activeTarget = "General";
        const msgContainer = document.getElementById('msg-container');
        const inputField = document.getElementById('chat-input-field');
        const chatTitle = document.getElementById('current-chat-title');

        function switchGroup(name) { activeChatMode = "group"; activeTarget = name; chatTitle.innerText = "Group: # " + name; fetchMessages(); updateUI(); }
        function switchDM(name) { activeChatMode = "dm"; activeTarget = name; chatTitle.innerText = "DM: @" + name; fetchMessages(); updateUI(); }
        
        function updateUI() {
            document.querySelectorAll('.item-btn').forEach(b => {
                if(activeChatMode === "group") b.classList.toggle('active', b.innerText.includes('# ' + activeTarget));
                else b.classList.toggle('active', b.innerText.includes('💬 ' + activeTarget));
            });
        }

        function renderMessages(list) {
            msgContainer.innerHTML = '';
            list.forEach(m => {
                const w = document.createElement('div');
                w.classList.add('msg-wrap', m.sender === clientUser ? 'me' : 'other');
                w.innerHTML = `<div class="msg-author">@${m.sender}</div><div class="msg-bubble">${m.text}</div>`;
                msgContainer.appendChild(w);
            });
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        function fetchMessages() {
            let url = activeChatMode === "group" ? `/api/get_messages?room=${activeTarget}` : `/api/get_dms?target=${activeTarget}`;
            fetch(url).then(r => r.json()).then(renderMessages);
        }

        function sendMessage() {
            const txt = inputField.value.trim();
            if(!txt) return;
            let url = activeChatMode === "group" ? '/api/send_message' : '/api/send_dm';
            let body = activeChatMode === "group" ? { room: activeTarget, text: txt } : { target: activeTarget, text: txt };
            
            fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
            .then(() => { inputField.value = ''; fetchMessages(); });
        }

        function mintDeveloperKey() {
            const name = document.getElementById('app-name-input').value.trim();
            if(!name) return;
            const f = new FormData(); f.append('app_name', name);
            fetch('/developer/keygen', { method: 'POST', body: f }).then(r => r.json()).then(d => {
                if(d.error) alert(d.error);
                else { alert(`Aero Key Minted for App: ${d.app_name}\nKey: ${d.api_key}`); window.location.reload(); }
            });
        }

        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
        setInterval(fetchMessages, 2500); 
        fetchMessages();
    </script>
</body>
</html>
