<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DapChat - Secure Entrance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); overflow: hidden; }
        
        .auth-container { width: 400px; padding: 40px; background: rgba(255, 255, 255, 0.08); border-radius: 24px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); text-align: center; color: white; }
        
        .auth-logo { font-size: 2.5rem; margin-bottom: 10px; font-weight: bold; letter-spacing: -1px; }
        .auth-logo span { color: #fffc00; }
        p { color: rgba(255, 255, 255, 0.6); margin-bottom: 30px; font-size: 0.95rem; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255, 255, 255, 0.5); margin-bottom: 8px; font-weight: 600; }
        
        input[type="text"], input[type="password"] { width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.15); background: rgba(0, 0, 0, 0.3); color: white; outline: none; font-size: 1rem; }
        input:focus { border-color: #fffc00; background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 10px rgba(255, 252, 0, 0.2); }
        
        .submit-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #fffc00; color: black; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .submit-btn:hover { background: #e6e200; }
        
        .switch-link { margin-top: 25px; font-size: 0.9rem; color: rgba(255, 255, 255, 0.7); }
        .switch-link a { color: #fffc00; text-decoration: none; font-weight: 600; }
        .switch-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">Dap<span>Chat</span></div>
        <p>Log in to access your matrix dashboard</p>
        
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Handle Identity</label>
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Security Key</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="submit-btn">Unlock Workspace</button>
        </form>
        
        <div class="switch-link">
            Need a secure identity? <a href="/signup">Sign Up Here</a>
        </div>
    </div>
</body>
</html>
