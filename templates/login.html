<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aero Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); overflow: hidden;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.12); padding: 40px; border-radius: 24px;
            backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37); text-align: center; color: white; width: 350px;
        }
        h2 { margin-bottom: 20px; font-weight: 600; }
        input {
            width: 100%; padding: 12px 20px; margin: 12px 0; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08); color: white; outline: none;
        }
        button {
            width: 100%; padding: 12px; border-radius: 25px; border: none; background: rgba(255, 255, 255, 0.9);
            color: #1a2a3a; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
        p { margin-top: 20px; font-size: 0.9rem; }
        a { color: #a1c4fd; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="glass-box">
        <h2>Welcome Back</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <p>Don't have an account? <a href="/signup">Sign Up</a></p>
    </div>
</body>
</html>
