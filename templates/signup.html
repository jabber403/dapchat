<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up - Aero Chat</title>
    <style>
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1f4068, #162447); margin: 0; font-family: sans-serif;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; color: white; width: 300px;
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: white; box-sizing: border-box; outline: none;
        }
        button {
            width: 100%; padding: 12px; border-radius: 25px; border: none; background: #28a745; color: white;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        a { color: #a1c4fd; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="glass-box">
        <h2>Join Aero Chat</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Create Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p style="margin-top:20px;"><a href="/login">Already have an account?</a></p>
    </div>
</body>
</html>
